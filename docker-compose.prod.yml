name: blog-api-with-caching-prod

services:
  db:
    image: postgres:18-alpine
    container_name: postgres_blog-api-with-caching-prod
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql
    env_file: ./.env.prod
    networks:
      - postgresnet
    command: >
      postgres -c max_connections=1000
               -c shared_buffers=256MB
               -c effective_cache_size=768MB
               -c maintenance_work_mem=64MB
               -c checkpoint_completion_target=0.7
               -c wal_buffers=16MB
               -c default_statistics_target=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        - ENVIRONMENT=production
        - INSTALL_DEV=false
    working_dir: /code
    volumes:
      - static_data_prod:/code/staticfiles
      - media_data_prod:/code/media
      - logs_data_prod:/code/logs
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ./.env.prod
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/1
    networks:
      - postgresnet
    restart: unless-stopped
    command: sh start.prod.sh

  redis:
    image: redis:8-alpine
    networks:
      - postgresnet
    volumes:
      - redis_data_prod:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  postgresnet:

volumes:
  postgres_data_prod:
  redis_data_prod:
  static_data_prod:
  media_data_prod:
  logs_data_prod:
